<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Robot Weld Approval</title>

<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;700&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:'Sarabun',sans-serif;
  background:#eef2f7;
  color:#333;
}

/* =========================
   HEADER
========================= */
.title-bar{
  background:linear-gradient(135deg,#0078d7,#0057a3);
  color:#fff;
  padding:20px 15px;
  text-align:center;
  font-size:30px;
  font-weight:700;
  line-height:1.4;
  box-shadow:0 4px 12px rgba(0,0,0,.15);
  border-bottom-left-radius:20px;
  border-bottom-right-radius:20px;
}

/* =========================
   FORM
========================= */
form{
  width:100%;
  max-width:850px;
  margin:auto;
  padding:15px;
}

/* =========================
   CARD SECTION
========================= */
.section{
  background:#fff;
  margin-bottom:18px;
  padding:18px;
  border-radius:18px;
  box-shadow:0 5px 15px rgba(0,0,0,.08);
  transition:.2s;
}

.section:hover{
  transform:translateY(-2px);
}

.section h3{
  font-size:24px;
  color:#0078d7;
  margin-bottom:15px;
  padding-bottom:10px;
  border-bottom:2px solid #edf2f7;
}

/* =========================
   INPUT
========================= */
label{
  display:block;
  margin-top:12px;
  margin-bottom:6px;
  font-weight:600;
  color:#444;
  font-size:18px;
}

input[type="text"],
textarea{
  width:100%;
  padding:14px;
  border:1px solid #d0d7e2;
  border-radius:12px;
  font-size:18px;
  background:#fafcff;
  transition:.2s;
}

input[type="text"]:focus,
textarea:focus{
  outline:none;
  border-color:#0078d7;
  background:#fff;
  box-shadow:0 0 0 4px rgba(0,120,215,.15);
}

textarea{
  resize:none;
  min-height:120px;
}

/* =========================
   ROW
========================= */
.row{
  display:flex;
  gap:15px;
  margin-bottom:10px;
}

.field{
  flex:1;
}

/* =========================
   FILE INPUT
========================= */
input[type="file"]{
  width:100%;
  padding:10px;
  border:2px dashed #b9c7d8;
  border-radius:12px;
  background:#f9fbff;
  cursor:pointer;
  font-size:16px;
}

/* =========================
   IMAGE PREVIEW
========================= */
.preview-img{
  width:100%;
  max-height:320px;
  object-fit:contain;
  margin-top:12px;
  border-radius:14px;
  border:1px solid #ddd;
  background:#fff;
  padding:5px;
}

/* =========================
   BUTTON
========================= */
button{
  width:100%;
  padding:18px;
  border:none;
  border-radius:16px;
  background:linear-gradient(135deg,#00a651,#008f45);
  color:#fff;
  font-size:24px;
  font-weight:700;
  cursor:pointer;
  margin-top:10px;
  box-shadow:0 6px 15px rgba(0,166,81,.3);
  transition:.25s;
}

button:hover{
  transform:translateY(-2px);
  background:linear-gradient(135deg,#009649,#007f3d);
}

button:active{
  transform:scale(.98);
}
/* =========================
   TABS
========================= */

.tabs{
  display:flex;
  gap:10px;
  margin-bottom:10px;
}

.tab-btn{
  flex:1;
  border:none;
  padding:14px;
  border-radius:14px;
  background:#dbe8f5;
  color:#444;
  font-size:17px;
  font-weight:700;
  cursor:pointer;
  transition:.25s;
}

.tab-btn.active{
  background:linear-gradient(135deg,#0078d7,#0057a3);
  color:#fff;
  box-shadow:0 4px 10px rgba(0,120,215,.25);
}

/* =========================
   TAB CONTENT
========================= */

.tab-content{
  display:none;
  animation:fade .25s ease;
}

.tab-content.active{
  display:block;
}

@keyframes fade{
  from{
    opacity:0;
    transform:translateY(10px);
  }
  to{
    opacity:1;
    transform:translateY(0);
  }
}

/* =========================
   REQUIRED ERROR
========================= */

.error{
  border:2px solid #ff4d4f !important;
  background:#fff1f0 !important;
}
/* =========================
   MOBILE
========================= */
@media(max-width:768px){

  .title-bar{
    font-size:24px;
    padding:18px 12px;
  }

  .section{
    padding:15px;
    border-radius:16px;
  }

  .section h3{
    font-size:21px;
  }

  .row{
    flex-direction:column;
    gap:5px;
  }

  input[type="text"],
  textarea{
    font-size:17px;
    padding:13px;
  }

  label{
    font-size:17px;
  }

  button{
    font-size:22px;
    padding:16px;
  }

  .preview-img{
    max-height:250px;
  }
}

</style>
</head>

<body>

<div class="title-bar">
  📌 ขออนุมัติปรับแนวเชื่อมโรบอท
</div>
<form id="requestForm">
<!-- =========================
     TAB BUTTONS
========================= -->

<div class="tabs">
  <button type="button" class="tab-btn active" onclick="openTab(1)">
    🛠 รายละเอียด
  </button>
  <button type="button" class="tab-btn" onclick="openTab(2)">
    📷 แนบรูปถ่าย
  </button>
</div>

<!-- =========================
     TAB 1
========================= -->

<div class="tab-content active" id="tab1">
  <div class="section">
    <h3>👤 ข้อมูลผู้ขอ</h3>

    <label>ชื่อผู้ขอ</label>
    <input type="text" name="requester" required>
  </div>
  <div class="section">
    <h3>🛠 รายละเอียดชิ้นงาน</h3>
    <div class="row">
      <div class="field">
        <label>Part No.</label>
        <input type="text" name="partNo" required>
      </div>
      <div class="field">
        <label>Part Name</label>
        <input type="text" name="partName" required>
      </div>
    </div>
    <div class="row">
      <div class="field">
        <label>Model</label>
        <input type="text" name="model" required>
      </div>
      <div class="field">
        <label>Job No.</label>
        <input type="text" name="jobNo" required>
      </div>
    </div>
  </div>
  <button type="button" onclick="nextTab()">
    ➡ ถัดไป
  </button>
</div>

<!-- =========================
     TAB 2
========================= -->

<div class="tab-content" id="tab2">
  <div class="section">
    <h3>📷 แนบรูปถ่าย</h3>
    <label>รูปก่อนปรับ</label>
    <input type="file"
           name="beforeImg"
           accept="image/*"
           onchange="previewImage(this,'beforePreview')"
           required>
    <img id="beforePreview" class="preview-img">
    <label>รูปหลังปรับ</label>
    <input type="file"
           name="afterImg"
           accept="image/*"
           onchange="previewImage(this,'afterPreview')"
           required>
    <img id="afterPreview" class="preview-img">
    <label>แบบลูกค้า</label>
    <input type="file"
           name="customerImg"
           accept="image/*"
           onchange="previewImage(this,'customerPreview')"
           required>
    <img id="customerPreview" class="preview-img">
  </div>

  <button type="submit">
    ✅ ส่งขออนุมัติ
  </button>
</div>
</form>
<script>
const scriptURL = "https://script.google.com/macros/s/AKfycbwZF2qpZ5-CwfnIjjNeDBLZSSljV0aGUljpDPAZzbfez_XQdqMxcrgXG_Zj0iHjgoWW/exec";
/* =========================
   OPEN TAB
========================= */

function openTab(tabNumber){

  document.querySelectorAll(".tab-btn")
    .forEach(btn => btn.classList.remove("active"));
  document.querySelectorAll(".tab-content")
    .forEach(tab => tab.classList.remove("active"));
  document.querySelectorAll(".tab-btn")[tabNumber-1]
    .classList.add("active");
  document.getElementById("tab"+tabNumber)
    .classList.add("active");
}

/* =========================
   NEXT TAB + VALIDATE
========================= */

function nextTab(){
  let valid = true;
  const requiredFields = document.querySelectorAll(
    '#tab1 input[required]'
  );
  requiredFields.forEach(field=>{
    field.classList.remove("error");
    if(!field.value.trim()){
      field.classList.add("error");
      valid = false;
    }
  });
  if(!valid){
    alert("⚠ กรุณากรอกข้อมูลให้ครบทุกช่อง");
    return;
  }
  openTab(2);
}

/* =========================
   SUBMIT VALIDATE
========================= */

document.getElementById("requestForm")
.addEventListener("submit", async e=>{
  e.preventDefault();
  let valid = true;
  const allRequired = document.querySelectorAll(
    '#requestForm input[required]'
  );
  allRequired.forEach(field=>{
    field.classList.remove("error");
    if(field.type === "file"){
      if(!field.files.length){
        field.classList.add("error");
        valid = false;
      }
    }else{
      if(!field.value.trim()){
        field.classList.add("error");
        valid = false;
      }
    }
  });
  if(!valid){
    alert("⚠ กรุณากรอกข้อมูลและแนบรูปให้ครบก่อนส่ง");
    return;
  }

  /* ====== เริ่มส่งข้อมูล ====== */

  const btn = e.target.querySelector('button[type="submit"]');
  btn.innerHTML = "⏳ กำลังส่งข้อมูล...";
  btn.disabled = true;
  const formData = new FormData(e.target);
  const data = {};
  async function toBase64(file){
    return new Promise((resolve,reject)=>{
      const reader = new FileReader();
      reader.onload = () =>
        resolve(reader.result.split(",")[1]);
      reader.onerror = error => reject(error);
      reader.readAsDataURL(file);
    });
  }
  data.requester = formData.get("requester");
  data.partNo = formData.get("partNo");
  data.partName = formData.get("partName");
  data.model = formData.get("model");
  data.jobNo = formData.get("jobNo");
  const beforeFile = formData.get("beforeImg");
  const afterFile = formData.get("afterImg");
  const customerFile = formData.get("customerImg");
  if(beforeFile)
    data.beforeImg = await toBase64(beforeFile);
  if(afterFile)
    data.afterImg = await toBase64(afterFile);
  if(customerFile)
    data.customerImg = await toBase64(customerFile);
  fetch(scriptURL,{
    method:"POST",
    body:JSON.stringify(data)
  })
  .then(res=>{
    alert("✅ ส่งคำขอเรียบร้อยแล้ว");
    e.target.reset();
    document.getElementById("beforePreview").src = "";
    document.getElementById("afterPreview").src = "";
    document.getElementById("customerPreview").src = "";
    btn.innerHTML = "✅ ส่งขออนุมัติ";
    btn.disabled = false;
    openTab(1);
  })
  .catch(err=>{
    alert("❌ เกิดข้อผิดพลาด : " + err);
    btn.innerHTML = "✅ ส่งขออนุมัติ";
    btn.disabled = false;
  });
});
function previewImage(input,previewId){
  const file = input.files[0];
  if(file){
    const reader = new FileReader();
    reader.onload = e => {
      document.getElementById(previewId).src = e.target.result;
    }
    reader.readAsDataURL(file);
  }
}

</script>

</body>
</html>
