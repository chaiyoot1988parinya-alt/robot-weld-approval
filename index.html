<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Robot Weld Approval</title>
  <style>
    body {
      font-family: "Segoe UI", sans-serif;
      background: #f4f6f9;
      margin: 0;
      padding: 0;
    }

    /* Title Bar */
    .title-bar {
      background: #0078d7;
      color: #fff;
      padding: 15px;
      text-align: center;
      font-size: 45px;
      font-weight: bold;
    }

    form {
      max-width: 100%;
      margin: auto;
      padding: 20px;
    }

    .section {
      background: #fff;
      margin-bottom: 20px;
      padding: 15px;
      border-radius: 8px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    .section h3 {
      margin-top: 0;
      color: #0078d7;
      border-bottom: 2px solid #eee;
      padding-bottom: 8px;
    }

    label {
      display: block;
      margin-top: 10px;
      font-weight: 600;
      color: #444;
    }

    input[type="text"],
    textarea {
      width: 100%;
      padding: 10px;
      margin-top: 5px;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 30px;
    }

    input[type="file"] {
      margin-top: 10px;
    }

    /* รูปภาพโชว์ใหญ่เต็มหน้าจอมือถือ */
    .preview-img {
      width: 100%;
      max-height: 400px;
      object-fit: contain;
      margin-top: 10px;
      border: 1px solid #ddd;
      border-radius: 6px;
    }

    button {
      width: 150px;
      padding: 12px;
      background: #0078d7;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 36px;
      font-weight: bold;
      cursor: pointer;
      margin-top: 20px;
      widht:300px;
    }

    button:hover {
      background: #005fa3;
    }
     .row {
    display: flex;
    gap: 10px;          /* ระยะห่างระหว่างช่อง */
    margin-bottom: 15px;
  }
  .row label {
    flex: 1;            /* label กว้างเท่ากัน */
  }
  .row input {
    flex: 2;            /* input กว้างกว่า label */
    padding: 10px;
    border: 1px solid #ccc;
    border-radius: 6px;
    width: 100%;
    box-sizing: border-box;
  }
  </style>
</head>
<body>
  <div class="title-bar">📌 ขออนุมัติปรับแนวเชื่อมโรบอท</div>

  <form id="requestForm">
    <div class="section">
      <h3>ข้อมูลผู้ขอ</h3>
      <label>ชื่อผู้ขอ:</label>
      <input type="text" name="requester" required>
    </div>
    <div class="section">
      <h3>รายละเอียดชิ้นงาน</h3>
  <div class="row">
    <label>Part No.:</label>
    <input type="text" name="partNo" required>
    <label>Part Name:</label>
    <input type="text" name="partName" required>
  </div>
  <!-- Model + Job No. -->
  <div class="row">
    <label>Model:</label>
    <input type="text" name="model" required>
    <label>Job No.:</label>
    <input type="text" name="jobNo" required>
  </div>
    </div>

    <div class="section">
      <h3>แนบรูปถ่าย</h3>
      <label>รูปก่อนปรับ:</label>
      <input type="file" name="beforeImg" accept="image/*" onchange="previewImage(this, 'beforePreview')" required>
      <img id="beforePreview" class="preview-img">

      <label>รูปหลังปรับ:</label>
      <input type="file" name="afterImg" accept="image/*" onchange="previewImage(this, 'afterPreview')" required>
      <img id="afterPreview" class="preview-img">

      <label>แบบลูกค้า:</label>
      <input type="file" name="customerImg" accept="image/*" onchange="previewImage(this, 'customerPreview')" required>
      <img id="customerPreview" class="preview-img">
    </div>

    <button type="submit">✅ ส่งขออนุมัติ</button>
  </form>

  <script>
    const scriptURL = "https://script.google.com/macros/s/AKfycbwZF2qpZ5-CwfnIjjNeDBLZSSljV0aGUljpDPAZzbfez_XQdqMxcrgXG_Zj0iHjgoWW/exec";

    document.getElementById("requestForm").addEventListener("submit", async e => {
      e.preventDefault();
      const formData = new FormData(e.target);
      const data = {};

      // ฟังก์ชันแปลงไฟล์เป็น Base64
      async function toBase64(file) {
        return new Promise((resolve, reject) => {
          const reader = new FileReader();
          reader.onload = () => resolve(reader.result.split(",")[1]);
          reader.onerror = error => reject(error);
          reader.readAsDataURL(file);
        });
      }

      data.requester = formData.get("requester");
      data.partNo = formData.get("partNo");
      data.partName = formData.get("partName");
      data.model = formData.get("model");
      data.jobNo = formData.get("jobNo");
      data.detail = formData.get("detail");

      const beforeFile = formData.get("beforeImg");
      const afterFile = formData.get("afterImg");
      const customerFile = formData.get("customerImg");

      if (beforeFile) data.beforeImg = await toBase64(beforeFile);
      if (afterFile) data.afterImg = await toBase64(afterFile);
      if (customerFile) data.customerImg = await toBase64(customerFile);

      fetch(scriptURL, {
        method: "POST",
        body: JSON.stringify(data)
      }).then(res => alert("ส่งคำขอเรียบร้อยแล้ว!"))
        .catch(err => alert("เกิดข้อผิดพลาด: " + err));
    });
        function previewImage(input, previewId) {
      const file = input.files[0];
      if (file) {
        const reader = new FileReader();
        reader.onload = e => {
          document.getElementById(previewId).src = e.target.result;
        };
        reader.readAsDataURL(file);
      }
    }
  </script>
</body>
</html>
